name: Deploy via FTP (manual / legado)

# O deploy principal agora é feito pela Vercel (push automático).
# Este workflow do FTP fica apenas como legado e só roda quando acionado
# manualmente em Actions → "Run workflow". NÃO dispara em push.
on:
  workflow_dispatch:

jobs:
  build-deploy:
    name: Build e enviar site estático do preview-site (legado)
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código do GitHub
        uses: actions/checkout@v4

      - name: Enviar preview-site por FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp
          local-dir: ./preview-site/
          server-dir: public_html/preview-site/
