name: Deploy Next via FTP

# Builda o site Next como estático (out/) e envia por FTP.
# basePath = "/preview-site" (next.config.mjs), então o out/ vai para
# public_html/preview-site/ — o site só aparece em /preview-site na URL.
# Roda apenas manualmente (Actions → "Run workflow"); não dispara em push.
on:
  workflow_dispatch:

jobs:
  build-deploy:
    name: Build Next e enviar out/ por FTP
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Build Next estático
        run: npm run build

      - name: Enviar out/ por FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp
          local-dir: ./out/
          server-dir: public_html/preview-site/
          timeout: 60000
          log-level: verbose
